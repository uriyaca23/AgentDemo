# ─────────────────────────────────────────────────────────────────
# Docker Compose — Full LLM Chatbot Stack
# ─────────────────────────────────────────────────────────────────
# Launches three services:
#   1. emulator  — vLLM + OpenRouter-compatible API (GPU required)
#   2. app       — Frontend (Next.js :3000) + Backend (FastAPI :8001)
#
# Quick start:
#   docker compose up --build
#
# For local testing with small model (RTX 3080):
#   docker compose --profile test up --build
# ─────────────────────────────────────────────────────────────────

services:
  # ── OpenRouter Emulator (GPU) ──────────────────────────────────
  emulator:
    build:
      context: .
      dockerfile: Dockerfile.test
    ports:
      - "8000:8000"
    volumes:
      - emulator-model-cache:/app/model_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8000/" ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

  # ── App (Frontend + Backend) ───────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8001"
    ports:
      - "3000:3000"
      - "8002:8001" # Shift internal API port if needed, but orchestrator is main entry
    environment:
      - LLM_BASE_URL=http://emulator:8000/api/v1
      - ORCHESTRATOR_URL=http://orchestrator:8001
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      emulator:
        condition: service_healthy
      orchestrator:
        condition: service_started

  # ── LangGraph Orchestrator ─────────────────────────────────────
  orchestrator:
    build:
      context: ../orchestrator
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - LLM_BASE_URL=http://emulator:8000/api/v1
      - MCP_SERVER_URL=http://mcp-server:8080/sse
    depends_on:
      emulator:
        condition: service_healthy
      mcp-server:
        condition: service_started

  # ── MCP Server (Tool Layer) ────────────────────────────────────
  mcp-server:
    build:
      context: ../mcp_server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ../mcp_server/skills:/app/skills
    environment:
      - SKILLS_DIR=/app/skills

volumes:
  emulator-model-cache:
